spring.application.name=support-agent

server.port=8080

# ── PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/supportdb
spring.datasource.username=support_user
spring.datasource.password=support_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────
# Flyway owns DDL — Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Anthropic Claude ─────────────────────────────────────────
anthropic.api-url=http://localhost:11434/v1/messages
anthropic.api.key=ollama
anthropic.model=glm-5:cloud
anthropic.max-tokens=1024

# ── Agent ────────────────────────────────────────────────────
agent.max-iterations=6
